<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                <a href="/dashboard">Личный кабинет</a>
                <a href="#" onclick="logout()">🚪 Выйти ({{ user.name }})</a>
            </div>
        </div>
    </nav>

    <div class="container" id="content">
        <div>Загрузка...</div>
    </div>

    <script>
        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        }
        
        async function loadDashboard() {
            try {
                const [profileRes, bookingsRes] = await Promise.all([
                    fetch('/api/profile'),
                    fetch('/api/bookings')
                ]);
                
                const profile = await profileRes.json();
                const bookings = await bookingsRes.json();
                
                document.getElementById('content').innerHTML = `
                    <div class="profile-header">
                        <div class="avatar">👤</div>
                        <div>
                            <h2>${profile.user.name}</h2>
                            <p>📧 ${profile.user.email}</p>
                            <p>🎭 Роль: ${profile.user.role === 'coach' ? 'Тренер' : 'Игрок'}</p>
                        </div>
                    </div>
                    <h3>📋 Мои записи</h3>
                    ${bookings.length === 0 ? '<div class="card">Нет записей</div>' : 
                        `<table><tr><th>Занятие</th><th>Тренер</th><th>Статус</th></tr>
                        ${bookings.map(b => `<tr><td>${b.title}</td><td>${b.coach_name}</td><td>${b.status}</td></tr>`).join('')}
                        </table>`
                    }
                `;
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="card">❌ Ошибка</div>';
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
