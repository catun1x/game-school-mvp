<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/dashboard.css">
    <link rel="stylesheet" href="/static/easter-egg.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><i class="fa-solid fa-gamepad"></i> CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                <a href="/dashboard">Личный кабинет</a>
                <a href="#" onclick="logout()">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-wrapper" id="content">
        <div style="text-align: center; padding: 60px;">Загрузка профиля...</div>
    </div>

    <!-- Кнопка-кулич -->
    <button class="easter-egg-btn" id="easterEggBtn">
        <img src="https://s10.iimage.su/s/12/th_gHU8xUgxGAEazq88SRU1V7vSVeXp4svBXi2mgNzbz.png" alt="Кулич">
    </button>

    <script src="/static/easter-egg.js"></script>
    <script>
        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        }
        
        async function loadDashboard() {
            try {
                const [profileRes, bookingsRes] = await Promise.all([
                    fetch('/api/profile'),
                    fetch('/api/bookings')
                ]);
                
                const profile = await profileRes.json();
                const bookings = await bookingsRes.json();
                
                const user = profile.user;
                const userProfile = profile.profile || {};
                
                const totalBookings = bookings.length;
                const confirmedBookings = bookings.filter(b => b.status === 'confirmed').length;
                
                const roleText = user.role === 'coach' ? '🏆 Тренер' : '🎮 Игрок';
                const roleClass = user.role === 'coach' ? 'coach' : 'player';
                
                let extraInfo = '';
                if (user.role === 'coach') {
                    extraInfo = `
                        <p><i class="fas fa-chalkboard-user"></i> ${userProfile.game ? `Игра: ${userProfile.game}` : 'Игра не указана'}</p>
                        <p><i class="fas fa-star"></i> Рейтинг: ${userProfile.rating || 'Новый'}</p>
                        <p><i class="fas fa-ruble-sign"></i> Цена: ${userProfile.price_per_hour || 'Договорная'} ₽/час</p>
                    `;
                } else {
                    extraInfo = `
                        <p><i class="fas fa-user-ninja"></i> Никнейм: ${userProfile.nickname || user.name}</p>
                        <p><i class="fas fa-chart-line"></i> Уровень: ${userProfile.level || 'Начинающий'}</p>
                        <p><i class="fas fa-gamepad"></i> Любимая игра: ${userProfile.preferred_game || 'Не указана'}</p>
                    `;
                }
                
                let bookingsHtml = '';
                if (bookings.length === 0) {
                    bookingsHtml = `
                        <div class="empty-bookings">
                            <i class="fas fa-calendar-alt"></i>
                            <p>У вас пока нет записей на занятия</p>
                            <a href="/coaches" class="btn">🎮 Найти тренера</a>
                        </div>
                    `;
                } else {
                    bookingsHtml = `
                        <div class="bookings-grid">
                            ${bookings.map(b => {
                                let statusClass = '';
                                let statusText = '';
                                if (b.status === 'confirmed') {
                                    statusClass = 'status-confirmed';
                                    statusText = '✅ Подтверждено';
                                } else if (b.status === 'pending') {
                                    statusClass = 'status-pending';
                                    statusText = '⏳ Ожидание';
                                } else {
                                    statusClass = 'status-cancelled';
                                    statusText = '❌ Отменено';
                                }
                                
                                return `
                                    <div class="booking-card">
                                        <div class="booking-title">${escapeHtml(b.title)}</div>
                                        <div class="booking-details">
                                            <div class="booking-detail">
                                                <i class="fas fa-user"></i>
                                                <span>Тренер: ${escapeHtml(b.coach_name)}</span>
                                            </div>
                                            <div class="booking-detail">
                                                <i class="fas fa-ruble-sign"></i>
                                                <span>Цена: ${b.price} ₽</span>
                                            </div>
                                            <div class="booking-detail">
                                                <i class="fas fa-calendar"></i>
                                                <span>Дата: ${new Date(b.created_at).toLocaleDateString()}</span>
                                            </div>
                                        </div>
                                        <div class="booking-status ${statusClass}">${statusText}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                }
                
                document.getElementById('content').innerHTML = `
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">
                                <div class="avatar-img">
                                    ${user.role === 'coach' ? '🏆' : '🎮'}
                                </div>
                            </div>
                            <div class="profile-info">
                                <h2>${escapeHtml(user.name)}</h2>
                                <p><i class="fas fa-envelope"></i> ${escapeHtml(user.email)}</p>
                                <div class="role-badge ${roleClass}">${roleText}</div>
                                ${extraInfo}
                            </div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-calendar-check"></i>
                            <div class="stat-value">${totalBookings}</div>
                            <div class="stat-label">Всего записей</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-check-circle"></i>
                            <div class="stat-value">${confirmedBookings}</div>
                            <div class="stat-label">Подтверждено</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clock"></i>
                            <div class="stat-value">${totalBookings - confirmedBookings}</div>
                            <div class="stat-label">В обработке</div>
                        </div>
                    </div>
                    
                    <div class="section-title">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Мои записи на занятия</span>
                    </div>
                    ${bookingsHtml}
                `;
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center; padding: 60px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: #dc3545; margin-bottom: 20px;"></i>
                        <p style="color: #ccc;">❌ Ошибка загрузки профиля</p>
                        <a href="/" class="btn" style="margin-top: 20px;">Вернуться на главную</a>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadDashboard();
    </script>
</body>
</html>
