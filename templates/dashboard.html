<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/dashboard.css">
    <link rel="stylesheet" href="/static/dashboard-extras.css">
    <link rel="stylesheet" href="/static/easter-egg.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="/" class="logo"><i class="fa-solid fa-gamepad"></i> CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                <a href="/dashboard">Личный кабинет</a>
                <a href="#" onclick="logout()">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-wrapper" id="content">
        <div style="text-align: center; padding: 60px;">Загрузка профиля...</div>
    </div>

    <!-- Модальное окно редактирования профиля -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Редактировать профиль</h3>
            <form id="editProfileForm">
                <label>Имя</label>
                <input type="text" id="edit_name" placeholder="Имя">
                
                <div id="coachFields" style="display: none;">
                    <label>Игра</label>
                    <input type="text" id="edit_game" placeholder="CS2, Dota 2, Valorant...">
                    
                    <label>Описание</label>
                    <textarea id="edit_description" rows="3" placeholder="Расскажите о себе"></textarea>
                    
                    <label>Опыт (лет)</label>
                    <input type="number" id="edit_experience_years" placeholder="0">
                    
                    <label>Цена за час (₽)</label>
                    <input type="number" id="edit_price_per_hour" placeholder="0">
                </div>
                
                <div id="playerFields" style="display: none;">
                    <label>Никнейм</label>
                    <input type="text" id="edit_nickname" placeholder="Ваш ник">
                    
                    <label>Уровень</label>
                    <select id="edit_level">
                        <option value="Начинающий">Начинающий</option>
                        <option value="Средний">Средний</option>
                        <option value="Продвинутый">Продвинутый</option>
                        <option value="Профессионал">Профессионал</option>
                    </select>
                    
                    <label>Любимая игра</label>
                    <input type="text" id="edit_preferred_game" placeholder="CS2, Dota 2...">
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="btn close-modal" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn">Сохранить</button>
                </div>
            </form>
            <div id="editMessage" style="margin-top: 10px;"></div>
        </div>
    </div>

    <!-- Кнопка-кулич -->
    <button class="easter-egg-btn" id="easterEggBtn">
        <img src="https://s10.iimage.su/s/12/th_gHU8xUgxGAEazq88SRU1V7vSVeXp4svBXi2mgNzbz.png" alt="Кулич">
    </button>

    <script src="/static/easter-egg.js"></script>
    <script>
        let currentUserData = null;
        let currentUserRole = null;

        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        }

        function openModal() {
            if (!currentUserData) return;
            
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('edit_name').value = currentUserData.user?.name || '';
            
            if (currentUserRole === 'coach') {
                document.getElementById('coachFields').style.display = 'block';
                document.getElementById('playerFields').style.display = 'none';
                document.getElementById('edit_game').value = currentUserData.profile?.game || '';
                document.getElementById('edit_description').value = currentUserData.profile?.description || '';
                document.getElementById('edit_experience_years').value = currentUserData.profile?.experience_years || 0;
                document.getElementById('edit_price_per_hour').value = currentUserData.profile?.price_per_hour || 0;
            } else {
                document.getElementById('coachFields').style.display = 'none';
                document.getElementById('playerFields').style.display = 'block';
                document.getElementById('edit_nickname').value = currentUserData.profile?.nickname || '';
                document.getElementById('edit_level').value = currentUserData.profile?.level || 'Начинающий';
                document.getElementById('edit_preferred_game').value = currentUserData.profile?.preferred_game || '';
            }
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('editMessage').innerHTML = '';
        }

        async function saveProfile(event) {
            event.preventDefault();
            
            const updateData = { name: document.getElementById('edit_name').value };
            
            if (currentUserRole === 'coach') {
                updateData.game = document.getElementById('edit_game').value;
                updateData.description = document.getElementById('edit_description').value;
                updateData.experience_years = parseInt(document.getElementById('edit_experience_years').value) || 0;
                updateData.price_per_hour = parseInt(document.getElementById('edit_price_per_hour').value) || 0;
            } else {
                updateData.nickname = document.getElementById('edit_nickname').value;
                updateData.level = document.getElementById('edit_level').value;
                updateData.preferred_game = document.getElementById('edit_preferred_game').value;
            }
            
            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });
                
                if (response.ok) {
                    document.getElementById('editMessage').innerHTML = '<div class="alert alert-success">✅ Профиль обновлён!</div>';
                    setTimeout(() => {
                        closeModal();
                        loadDashboard();
                    }, 1500);
                } else {
                    const error = await response.json();
                    document.getElementById('editMessage').innerHTML = `<div class="alert alert-error">❌ ${error.detail || 'Ошибка'}</div>`;
                }
            } catch (error) {
                document.getElementById('editMessage').innerHTML = '<div class="alert alert-error">❌ Ошибка соединения</div>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadDashboard() {
            try {
                const response = await fetch('/api/profile');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Profile data:', data); // Для отладки в консоли
                
                // Проверяем структуру данных
                if (!data || !data.user) {
                    throw new Error('Некорректный ответ от сервера');
                }
                
                currentUserData = data;
                currentUserRole = data.user.role;
                
                const user = data.user;
                const userProfile = data.profile || {};
                
                const roleText = user.role === 'coach' ? '🏆 Тренер' : '🎮 Игрок';
                const roleClass = user.role === 'coach' ? 'coach' : 'player';
                
                let extraInfo = '';
                let statsHtml = '';
                let bookingsHtml = '';
                
                if (user.role === 'coach') {
                    // Информация тренера
                    extraInfo = `
                        <p><i class="fas fa-chalkboard-user"></i> Игра: ${escapeHtml(userProfile.game || 'Не указана')}</p>
                        <p><i class="fas fa-star"></i> Рейтинг: ${userProfile.rating || 'Новый'}</p>
                        <p><i class="fas fa-ruble-sign"></i> Цена: ${userProfile.price_per_hour || 'Договорная'} ₽/час</p>
                        <p><i class="fas fa-calendar"></i> Опыт: ${userProfile.experience_years || 0} лет</p>
                    `;
                    
                    // Загружаем учеников тренера
                    const studentsRes = await fetch('/api/coaches/bookings');
                    const studentsData = await studentsRes.json();
                    const students = studentsData.bookings || [];
                    
                    const totalStudents = students.length;
                    const confirmedStudents = students.filter(s => s.status === 'confirmed').length;
                    
                    statsHtml = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <i class="fas fa-users"></i>
                                <div class="stat-value">${totalStudents}</div>
                                <div class="stat-label">Всего учеников</div>
                            </div>
                            <div class="stat-card">
                                <i class="fas fa-check-circle"></i>
                                <div class="stat-value">${confirmedStudents}</div>
                                <div class="stat-label">Подтверждено</div>
                            </div>
                        </div>
                    `;
                    
                    if (students.length === 0) {
                        bookingsHtml = `
                            <div class="empty-bookings">
                                <i class="fas fa-user-graduate"></i>
                                <p>У вас пока нет учеников</p>
                                <a href="/coaches" class="btn">🎮 Продвигать курсы</a>
                            </div>
                        `;
                    } else {
                        bookingsHtml = `
                            <div class="students-grid">
                                ${students.map(s => `
                                    <div class="student-card">
                                        <div class="student-name">${escapeHtml(s.student_name)}</div>
                                        <div class="student-detail">
                                            <i class="fas fa-envelope"></i>
                                            <span>${escapeHtml(s.student_email)}</span>
                                        </div>
                                        <div class="student-detail">
                                            <i class="fas fa-tag"></i>
                                            <span>${escapeHtml(s.title)}</span>
                                        </div>
                                        <div class="student-detail">
                                            <i class="fas fa-ruble-sign"></i>
                                            <span>${s.price} ₽</span>
                                        </div>
                                        <div class="booking-status ${s.status === 'confirmed' ? 'status-confirmed' : 'status-pending'}">
                                            ${s.status === 'confirmed' ? '✅ Подтверждено' : '⏳ Ожидание'}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    
                    document.getElementById('content').innerHTML = `
                        <div class="profile-card">
                            <div class="profile-header">
                                <div class="profile-avatar">
                                    <div class="avatar-img">🏆</div>
                                </div>
                                <div class="profile-info">
                                    <h2>${escapeHtml(user.name)}</h2>
                                    <p><i class="fas fa-envelope"></i> ${escapeHtml(user.email)}</p>
                                    <div class="role-badge ${roleClass}">${roleText}</div>
                                    ${extraInfo}
                                    <button onclick="openModal()" class="btn edit-btn" style="margin-top: 15px;"><i class="fas fa-pencil-alt"></i> Редактировать профиль</button>
                                </div>
                            </div>
                        </div>
                        ${statsHtml}
                        <div class="section-title">
                            <i class="fas fa-user-graduate"></i>
                            <span>Мои ученики</span>
                        </div>
                        ${bookingsHtml}
                    `;
                    
                } else {
                    // Игрок
                    extraInfo = `
                        <p><i class="fas fa-user-ninja"></i> Никнейм: ${escapeHtml(userProfile.nickname || user.name)}</p>
                        <p><i class="fas fa-chart-line"></i> Уровень: ${escapeHtml(userProfile.level || 'Начинающий')}</p>
                        <p><i class="fas fa-gamepad"></i> Любимая игра: ${escapeHtml(userProfile.preferred_game || 'Не указана')}</p>
                    `;
                    
                    // Загружаем бронирования игрока
                    const bookingsRes = await fetch('/api/bookings');
                    const bookings = await bookingsRes.json();
                    
                    const totalBookings = bookings.length;
                    const confirmedBookings = bookings.filter(b => b.status === 'confirmed').length;
                    
                    statsHtml = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <i class="fas fa-calendar-check"></i>
                                <div class="stat-value">${totalBookings}</div>
                                <div class="stat-label">Всего записей</div>
                            </div>
                            <div class="stat-card">
                                <i class="fas fa-check-circle"></i>
                                <div class="stat-value">${confirmedBookings}</div>
                                <div class="stat-label">Подтверждено</div>
                            </div>
                        </div>
                    `;
                    
                    if (bookings.length === 0) {
                        bookingsHtml = `
                            <div class="empty-bookings">
                                <i class="fas fa-calendar-alt"></i>
                                <p>У вас пока нет записей на занятия</p>
                                <a href="/coaches" class="btn">🎮 Найти тренера</a>
                            </div>
                        `;
                    } else {
                        bookingsHtml = `
                            <div class="bookings-grid">
                                ${bookings.map(b => {
                                    let statusClass = '';
                                    let statusText = '';
                                    if (b.status === 'confirmed') {
                                        statusClass = 'status-confirmed';
                                        statusText = '✅ Подтверждено';
                                    } else if (b.status === 'pending') {
                                        statusClass = 'status-pending';
                                        statusText = '⏳ Ожидание';
                                    } else {
                                        statusClass = 'status-cancelled';
                                        statusText = '❌ Отменено';
                                    }
                                    return `
                                        <div class="booking-card">
                                            <div class="booking-title">${escapeHtml(b.title)}</div>
                                            <div class="booking-details">
                                                <div class="booking-detail">
                                                    <i class="fas fa-user"></i>
                                                    <span>Тренер: ${escapeHtml(b.coach_name)}</span>
                                                </div>
                                                <div class="booking-detail">
                                                    <i class="fas fa-ruble-sign"></i>
                                                    <span>Цена: ${b.price} ₽</span>
                                                </div>
                                                <div class="booking-detail">
                                                    <i class="fas fa-calendar"></i>
                                                    <span>Дата: ${new Date(b.created_at).toLocaleDateString()}</span>
                                                </div>
                                            </div>
                                            <div class="booking-status ${statusClass}">${statusText}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `;
                    }
                    
                    document.getElementById('content').innerHTML = `
                        <div class="profile-card">
                            <div class="profile-header">
                                <div class="profile-avatar">
                                    <div class="avatar-img">🎮</div>
                                </div>
                                <div class="profile-info">
                                    <h2>${escapeHtml(user.name)}</h2>
                                    <p><i class="fas fa-envelope"></i> ${escapeHtml(user.email)}</p>
                                    <div class="role-badge ${roleClass}">${roleText}</div>
                                    ${extraInfo}
                                    <button onclick="openModal()" class="btn edit-btn" style="margin-top: 15px;"><i class="fas fa-pencil-alt"></i> Редактировать профиль</button>
                                </div>
                            </div>
                        </div>
                        ${statsHtml}
                        <div class="section-title">
                            <i class="fas fa-clipboard-list"></i>
                            <span>Мои записи на занятия</span>
                        </div>
                        ${bookingsHtml}
                    `;
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center; padding: 60px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: #dc3545; margin-bottom: 20px;"></i>
                        <p style="color: #ccc;">❌ Ошибка загрузки профиля: ${error.message}</p>
                        <a href="/" class="btn" style="margin-top: 20px;">Вернуться на главную</a>
                    </div>
                `;
            }
        }
        
        // Инициализация
        document.getElementById('editProfileForm').addEventListener('submit', saveProfile);
        loadDashboard();
    </script>
</body>
</html>
