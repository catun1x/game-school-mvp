<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на занятие — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                <a href="/dashboard">Личный кабинет</a>
                <a href="/logout">Выйти ({{ user.name }})</a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin-top: 80px;">
        <div class="card">
            <h2 style="text-align: center;">📝 Подтверждение записи</h2>
            <div id="info" style="margin: 20px 0; text-align: center;">Загрузка информации о занятии...</div>
            <button class="btn" style="width: 100%;" id="confirmBtn">✅ Подтвердить запись</button>
            <div id="message" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        const sessionId = {{ session_id }};
        
        async function confirmBooking() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Обработка...';
            
            try {
                const response = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const messageDiv = document.getElementById('message');
                    messageDiv.innerHTML = '<div class="alert alert-success">✅ Запись успешно оформлена! Перенаправление...</div>';
                    setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
                } else {
                    btn.disabled = false;
                    btn.textContent = '✅ Подтвердить запись';
                    const messageDiv = document.getElementById('message');
                    messageDiv.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${data.detail || 'Не удалось записаться'}</div>`;
                }
            } catch (error) {
                btn.disabled = false;
                btn.textContent = '✅ Подтвердить запись';
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = '<div class="alert alert-error">❌ Ошибка соединения с сервером</div>';
            }
        }
        
        document.getElementById('confirmBtn').addEventListener('click', confirmBooking);
        document.getElementById('info').innerHTML = '<p>Пожалуйста, подтвердите запись на выбранное занятие.</p>';
    </script>
</body>
</html>
