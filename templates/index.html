<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachHub — Платформа для поиска тренеров</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                {% if user %}
                    <a href="/dashboard">Личный кабинет</a>
                    <a href="#" onclick="logout()">🚪 Выйти ({{ user.name }})</a>
                {% else %}
                    <a href="/login">Вход</a>
                    <a href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="text-align: center; padding: 80px 0 60px;">
            <h1 style="font-size: 52px;">Найди <span style="color: #00d4ff;">профессионального тренера</span></h1>
            <p style="font-size: 22px; color: #ccc;">CS2 · Dota 2 · Valorant · LoL · и другие игры</p>
            <a href="/coaches" class="btn" style="font-size: 18px;">Найти тренера →</a>
        </div>
    </div>

    <script>
        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        }
    </script>
</body>
</html>
