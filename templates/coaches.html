<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренеры — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                {% if user %}
                    <a href="/dashboard">Личный кабинет</a>
                    <a href="/logout">Выйти ({{ user.name }})</a>
                {% else %}
                    <a href="/login">Вход</a>
                    <a href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>👨‍🏫 Наши тренеры</h2>
        
        <div class="search-bar">
            <input type="text" id="gameFilter" placeholder="Поиск по игре (CS2, Dota 2, Valorant...)" value="{{ game_filter }}">
            <button class="btn" id="searchBtn">Поиск</button>
        </div>

        <div id="coachesList" class="grid">
            <div style="text-align: center; padding: 40px;">Загрузка...</div>
        </div>
    </div>

    <script>
        async function loadCoaches() {
            const game = document.getElementById('gameFilter').value;
            const url = game ? `/api/coaches?game=${encodeURIComponent(game)}` : '/api/coaches';
            
            try {
                const response = await fetch(url);
                const coaches = await response.json();
                
                const container = document.getElementById('coachesList');
                if (!coaches || coaches.length === 0) {
                    container.innerHTML = '<div class="card">😕 Тренеры не найдены. Попробуйте изменить поиск.</div>';
                    return;
                }
                
                container.innerHTML = coaches.map(coach => `
                    <div class="card">
                        <h3>${escapeHtml(coach.name)}</h3>
                        <p>🎮 ${escapeHtml(coach.game || 'Любая игра')}</p>
                        <p>⭐ ${coach.rating || 'Новый'} / 5.0</p>
                        <p>💰 ${coach.price_per_hour || 'Договорная'} ₽/час</p>
                        <p>📅 Опыт: ${coach.experience_years || 0} лет</p>
                        <a href="/coaches/${coach.id}" class="btn" style="margin-top: 15px; display: inline-block;">Подробнее →</a>
                    </div>
                `).join('');
            } catch (error) {
                const container = document.getElementById('coachesList');
                container.innerHTML = '<div class="card">❌ Ошибка загрузки данных. Проверьте соединение с сервером.</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchBtn').addEventListener('click', loadCoaches);
        document.getElementById('gameFilter').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadCoaches();
        });
        
        loadCoaches();
    </script>
</body>
</html>
