<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренеры — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                {% if user %}
                    <a href="/dashboard">Личный кабинет</a>
                    <a href="#" onclick="logout()">🚪 Выйти ({{ user.name }})</a>
                {% else %}
                    <a href="/login">Вход</a>
                    <a href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>👨‍🏫 Наши тренеры</h2>
        
        <div class="search-bar">
            <input type="text" id="gameFilter" placeholder="Поиск по игре (CS2, Dota 2, Valorant...)" value="{{ game_filter }}">
            <button class="btn" onclick="searchCoaches()">Поиск</button>
        </div>

        <div id="coachesList" class="grid">
            <div>Загрузка...</div>
        </div>
    </div>

    <script>
        async function loadCoaches() {
            const game = document.getElementById('gameFilter').value;
            const url = game ? `/api/coaches?game=${encodeURIComponent(game)}` : '/api/coaches';
            
            try {
                const response = await fetch(url);
                const coaches = await response.json();
                
                const container = document.getElementById('coachesList');
                if (!coaches || coaches.length === 0) {
                    container.innerHTML = '<div class="card">😕 Тренеры не найдены. Зарегистрируйтесь как тренер или добавьте тестовых.</div>';
                    return;
                }
                
                container.innerHTML = coaches.map(coach => `
                    <div class="card">
                        <h3>${coach.name}</h3>
                        <p>🎮 ${coach.game || 'Любая игра'}</p>
                        <p>⭐ ${coach.rating || 'Новый'}</p>
                        <p>💰 ${coach.price_per_hour || 'Договорная'} ₽/час</p>
                        <a href="/coaches/${coach.id}" class="btn">Подробнее →</a>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('coachesList').innerHTML = '<div class="card">❌ Ошибка загрузки</div>';
            }
        }
        
        function searchCoaches() {
            loadCoaches();
        }
        
        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        }
        
        loadCoaches();
    </script>
</body>
</html>
