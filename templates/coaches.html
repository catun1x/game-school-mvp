<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренеры — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/coaches.css">
    <link rel="stylesheet" href="/static/easter-egg.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                {% if user %}
                    <a href="/dashboard">Личный кабинет</a>
                    <a href="#" onclick="logout()">🚪 Выйти ({{ user.name }})</a>
                {% else %}
                    <a href="/login">Вход</a>
                    <a href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="coaches-header">
            <h2>👨‍🏫 Наши тренеры</h2>
            <p>Выберите своего наставника и начните побеждать!</p>
        </div>
        
        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="gameFilter" placeholder="🔍 Поиск по игре (CS2, Dota 2, Valorant...)" value="{{ game_filter }}">
                <button onclick="searchCoaches()">Найти</button>
            </div>
        </div>

        <div id="coachesList">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p style="margin-top: 15px; color: #aaa;">Загрузка тренеров...</p>
            </div>
        </div>
    </div>

    <!-- Кнопка-кулич -->
    <button class="easter-egg-btn" id="easterEggBtn">
        <img src="https://s10.iimage.su/s/12/th_gHU8xUgxGAEazq88SRU1V7vSVeXp4svBXi2mgNzbz.png" alt="Кулич">
    </button>

    <script src="/static/easter-egg.js"></script>
    <script>
        async function loadCoaches() {
            const game = document.getElementById('gameFilter').value;
            const url = game ? `/api/coaches?game=${encodeURIComponent(game)}` : '/api/coaches';
            
            try {
                const response = await fetch(url);
                const coaches = await response.json();
                
                const container = document.getElementById('coachesList');
                if (!coaches || coaches.length === 0) {
                    container.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-search"></i>
                            <p>😕 Тренеры не найдены</p>
                            <p style="font-size: 14px;">Попробуйте изменить параметры поиска</p>
                            <button onclick="resetSearch()" class="btn">Показать всех</button>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `
                    <div class="coaches-grid">
                        ${coaches.map(coach => {
                            const rating = coach.rating || 'Новый';
                            const ratingDisplay = typeof rating === 'number' ? `${rating} ⭐` : rating;
                            const price = coach.price_per_hour || 'Договорная';
                            const priceDisplay = typeof price === 'number' ? `${price} ₽/час` : price;
                            const gameName = coach.game || 'Любая игра';
                            
                            return `
                                <div class="coach-card">
                                    <div class="coach-avatar">
                                        <i class="fas fa-chalkboard-user"></i>
                                        <div class="coach-rating">
                                            <i class="fas fa-star"></i> ${ratingDisplay}
                                        </div>
                                    </div>
                                    <div class="coach-info">
                                        <div class="coach-name">${escapeHtml(coach.name)}</div>
                                        <div class="coach-game">🎮 ${escapeHtml(gameName)}</div>
                                        <div class="coach-stats">
                                            <div class="coach-stat">
                                                <div class="stat-value">${coach.experience_years || 0}+</div>
                                                <div class="stat-label">лет опыта</div>
                                            </div>
                                            <div class="coach-stat">
                                                <div class="stat-value">${coach.total_students || '50'}+</div>
                                                <div class="stat-label">учеников</div>
                                            </div>
                                            <div class="coach-stat">
                                                <div class="stat-value">${coach.total_lessons || '200'}+</div>
                                                <div class="stat-label">занятий</div>
                                            </div>
                                        </div>
                                        <div class="coach-price">${priceDisplay}</div>
                                        <a href="/coaches/${coach.id}" class="coach-btn">Подробнее →</a>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            } catch (error) {
                document.getElementById('coachesList').innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>❌ Ошибка загрузки данных</p>
                        <button onclick="loadCoaches()" class="btn">Повторить</button>
                    </div>
                `;
            }
        }
        
        function searchCoaches() {
            loadCoaches();
        }
        
        function resetSearch() {
            document.getElementById('gameFilter').value = '';
            loadCoaches();
        }
        
        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadCoaches();
        
        document.getElementById('gameFilter').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCoaches();
            }
        });
    </script>
</body>
</html>
