<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 80px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 30px;">Вход в аккаунт</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Войти</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Нет аккаунта? <a href="/register" style="color: #00d4ff;">Зарегистрироваться</a>
            </p>
            <div id="message" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.cookie = `access_token=${data.access_token}; path=/`;
                    window.location.href = '/dashboard';
                } else {
                    const messageDiv = document.getElementById('message');
                    messageDiv.innerHTML = '<div class="alert alert-error">Неверный email или пароль</div>';
                }
            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = '<div class="alert alert-error">Ошибка соединения с сервером</div>';
            }
        });
    </script>
</body>
</html>
