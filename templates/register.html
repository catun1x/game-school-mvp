<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — CoachHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">🎮 CoachHub</a>
            <div class="nav-links">
                <a href="/coaches">Тренеры</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 80px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 30px;">Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="role" name="role">
                        <option value="player">Игрок (ученик)</option>
                        <option value="coach">Тренер</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
            </form>
            <div id="message" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.cookie = `access_token=${data.access_token}; path=/`;
                    window.location.href = '/dashboard';
                } else {
                    const messageDiv = document.getElementById('message');
                    messageDiv.innerHTML = `<div class="alert alert-error">${data.detail || 'Ошибка регистрации'}</div>`;
                }
            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = '<div class="alert alert-error">Ошибка соединения с сервером</div>';
            }
        });
    </script>
</body>
</html>
